{% set name = "BioServices" %}
{% set version = "1.12.1" %}
{% set sha256 = "0f31782ae50930d4ab82b43f98d1ca2cc9befaa699f3a7a6cba512a8f9e2cab0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/bioservices-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --use-pep517 --no-deps --no-build-isolation --no-cache-dir -vvv
  entry_points:
    - bioservices = bioservices.main:main

requirements:
  host:
    - python >=3.9
    - pip
    - poetry-core
  run:
    - python >=3.9
    - appdirs
    - beautifulsoup4
    - click
    - colorlog
    - easydev >=0.13.3
    - grequests
    - matplotlib-base
    - pandas >2.2
    - requests
    - requests-cache
    - rich-click >=1.8.5
    - suds-community >=1.2.0
    - lxml
    - tqdm
    - wrapt
    - xmltodict

test:
  imports:
    - bioservices
    - bioservices.apps
    - bioservices.mapping
  commands:
    - bioservices --help

about:
  home: "https://github.com/cokelaer/bioservices"
  summary: "Access to Biological Web Services from Python."
  license: "GPL-3.0-only"
  license_family: GPL3
  license_file: LICENSE
  doc_url: "https://bioservices.readthedocs.io/en/main"
  dev_url: "https://github.com/cokelaer/bioservices"

extra:
  recipe-maintainers:
    - mencian

{% set name = "BioServices" %}
{% set version = "1.14.0" %}
{% set sha256 = "82208d6d8763f143b59790433b3b3661d57345a3fdbfeaee87c21ef3a422b3fa" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/bioservices-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --use-pep517 --no-deps --no-cache-dir --no-build-isolation -vvv
  entry_points:
    - bioservices = bioservices.main:main

requirements:
  host:
    - python >=3.9
    - pip
    - poetry-core
  run:
    - python >=3.9
    - appdirs
    - beautifulsoup4
    - click
    - colorlog
    - easydev >=0.12.0
    - grequests
    - matplotlib-base
    - pandas >=0.21.1
    - requests
    - requests_cache
    - rich-click
    - setuptools <78
    - suds-community >=0.7
    - lxml
    - tqdm
    - wrapt
    - xmltodict

test:
  imports:
    - bioservices
    - bioservices.apps
    - bioservices.mapping
  commands:
    - bioservices --help

about:
  home: "https://github.com/cokelaer/bioservices"
  summary: "Access to Biological Web Services from Python."
  license: "GPL-3.0-only"
  license_family: GPL3
  license_file: LICENSE
  doc_url: "https://bioservices.readthedocs.io/en/main"
  dev_url: "https://github.com/cokelaer/bioservices"

extra:
  recipe-maintainers:
    - mencian
